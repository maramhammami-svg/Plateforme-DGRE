# Passerelle / point d'observation unique.
# Tout le trafic passe ici ; les logs d'accès nginx serviront plus tard
# de source reseau pour la couche d'observabilite de l'agent.
log_format observ '$time_iso8601 ip=$remote_addr method=$request_method '
                  'uri=$uri status=$status bytes=$body_bytes_sent '
                  'ua="$http_user_agent"';

server {
    listen 80;
    access_log /var/log/nginx/access.log observ;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
