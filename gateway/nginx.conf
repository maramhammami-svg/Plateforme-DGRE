# Passerelle / point d'observation unique.
# Sert le frontend statique ET proxifie l'API (meme origine -> pas de CORS).
log_format observ '$time_iso8601 ip=$remote_addr method=$request_method '
                  'uri=$uri status=$status bytes=$body_bytes_sent '
                  'ua="$http_user_agent"';

server {
    listen 80;
    access_log /var/log/nginx/access.log observ;

    # Garde-fou par defaut : corps de requete plafonne (entrees oversized rejetees en 413)
    client_max_body_size 1m;

    # Import CSV brut : besoin d'un plafond plus large, aligne sur MAX_IMPORT_CSV_BYTES cote API
    location = /raw-readings/import {
        client_max_body_size 5m;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Routes de l'API -> conteneur api
    location ~ ^/(auth|stations|readings|raw-readings|events|admin|health|docs|redoc|openapi.json|consolidations|documents|dashboard) {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend statique
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
